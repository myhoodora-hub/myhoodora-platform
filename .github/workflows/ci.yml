name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Do not expose secrets at the job level to avoid context-access warnings
    # Set secrets only on the steps that need them (see Build step below)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Check types
        run: pnpm run check-types

      - name: Build
        run: |
          export EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}
          pnpm run build
        shell: bash
